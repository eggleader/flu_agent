# BioAgent 配置文件
# 参考 POPGENAGENT 的 config.yaml.example

# ========== LLM 配置 ==========
llm:
  base_url: "http://localhost:11434"
  model: "qwen3:4b"
  temperature: 0.7
  timeout: 300
  max_tokens: 4096

# ========== 路径配置 ==========
paths:
  tools_dir: "tools"
  knowledge_dir: "knowledge"
  workflow_dir: "workflow"
  data_dir: "data"
  reports_dir: "reports"
  example_dir: "example"

# ========== 生信工具路径配置 ==========
# 格式: "工具名: 路径"
# 引擎启动时会自动检测可用性
tools:
  # 序列处理
  seqkit: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/seqkit"

  # 质控
  fastp: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/fastp"
  fastqc: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/fastqc"
  multiqc: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/multiqc"
  cutadapt: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/cutadapt"

  # 组装
  spades: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/spades.py"
  megahit: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/megahit"

  # 比对与排序
  bwa: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/bwa"
  minimap2: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/minimap2"
  samtools: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/samtools"
  blastn: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/blastn"
  diamond: "/Users/guojd/opt/anaconda3/bin/diamond"

  # 分类
  kraken2: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/kraken2"

  # 多序列比对
  mafft: "/Users/guojd/opt/anaconda3/envs/mamba_env/envs/tree/bin/mafft"
  trimal: "/Users/guojd/opt/anaconda3/envs/mamba_env/envs/tree/bin/trimal"

  # 蛋白结构比对
  hhblits: "/Users/guojd/opt/anaconda3/envs/hhsuite/bin/hhblits"
  hhsearch: "/Users/guojd/opt/anaconda3/envs/hhsuite/bin/hhsearch"
  hhfilter: "/Users/guojd/opt/anaconda3/envs/hhsuite/bin/hhfilter"

  # 进化分析
  iqtree2: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/iqtree2"
  codeml: "/Users/guojd/vscode/softwares/paml/bin/codeml"
  baseml: "/Users/guojd/vscode/softwares/paml/bin/baseml"
  basemlg: "/Users/guojd/vscode/softwares/paml/bin/basemlg"
  evolver: "/Users/guojd/vscode/softwares/paml/bin/evolver"
  mcmctree: "/Users/guojd/vscode/softwares/paml/bin/mcmctree"
  yn00: "/Users/guojd/vscode/softwares/paml/bin/yn00"

  # 分类学
  taxonkit: "/Users/guojd/opt/anaconda3/envs/mamba_env/bin/taxonkit"

  # 其他
  swarm: "/Users/guojd/swarm/bin/swarm"
  circos: "/Users/guojd/software/circos/current/bin/circos"

# ========== Agent 配置 ==========
agent:
  # 最大工具调用轮次
  max_tool_rounds: 10
  # 是否启用 Planner-Executor 模式（默认关闭，模型升级后可启用）
  enable_planner: false
  # 简单任务阈值（工具调用数 >= 此值时启用 Planner）
  planner_threshold: 2
  # 默认线程数
  default_threads: 4
  # 命令执行超时（秒）
  command_timeout: 600

# ========== Web UI 配置 ==========
web:
  enable: false
  port: 7860
  share: false
  debug: false

# ========== 数据库配置 ==========
database:
  type: "sqlite"
  path: "data/sessions/bioagent.db"

# ========== 日志配置 ==========
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "bioagent.log"
